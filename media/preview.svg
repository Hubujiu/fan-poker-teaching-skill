      <rect x="34" y="34" width="54" height="38" rx="19" fill="#fff" fill-opacity=".86" stroke="#171717" stroke-opacity=".14"/>
      <text x="61" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#171717">01</text>
      <text x="280" y="156" text-anchor="middle" font-family="Georgia, serif" font-size="104" fill="#171717" fill-opacity=".7">A</text>
      <text x="38" y="238" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#e96d2f">AGENT SKILL</text>
      <text x="38" y="290" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#171717">One idea</text>
      <text x="38" y="332" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#171717">per card.</text>
