  <rect width="1200" height="630" fill="#f7f4ee"/>
  <circle cx="1040" cy="96" r="116" fill="#f2a65a" opacity=".25"/>
  <circle cx="114" cy="536" r="170" fill="#7dcfb6" opacity=".18"/>

  <g transform="translate(675 78)">
