<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fan Poker Deck v2 JavaScript API</title>
  <script type="module" src="../dist/fan-poker.js"></script>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#f4f1eb; }
    fan-poker { width:min(620px, calc(100vw - 20px)); }
  </style>
</head>
<body>
  <fan-poker id="deck" aria-label="Runtime deck"></fan-poker>

  <script type="module">
    await customElements.whenDefined("fan-poker");

    const deck = document.querySelector("#deck");

    deck.setCards([
      {
        label: "Dashboard",
        html: `
          <style>
            :host { display:block; min-height:100%; background:#fff8ed; font-family:system-ui; }
            main { min-width:100%; min-height:100%; padding:28px; }
          </style>
          <main><h1>Runtime dashboard</h1><button>Interactive button</button></main>
        `
      },
      {
        label: "Wide canvas",
        html: `
          <style>
            :host { display:block; min-height:100%; background:#101713; color:#d7f9df; }
            main { width:760px; min-height:100%; padding:24px; }
          </style>
          <main><h1>Horizontal world</h1><p>Drag in the card to scroll.</p></main>
        `
      }
    ]);

    deck.addEventListener("cardchange", (event) => {
      console.log("active card", event.detail.index);
    });
  </script>
</body>
</html>
