<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fan Poker Deck v2 custom worlds</title>
  <script type="module" src="../dist/fan-poker.js"></script>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#eeeae3; }
    fan-poker {
      width:min(640px, calc(100vw - 20px));
      --fan-card-radius: 30px;
      --fan-scrollbar-accent: #ff6b35;
    }
  </style>
</head>
<body>
  <fan-poker id="deck" card-width="410px" card-height="540px" aria-label="Custom worlds">
    <fan-card aria-label="Dark terminal">
      <style>
        :host {
          display:block;
          min-height:100%;
          background:#0b110d;
          color:#d7f9df;
          font-family:ui-monospace, monospace;
        }

        .terminal {
          width:760px;
          min-height:900px;
          padding:24px;
          background:#0b110d;
        }
      </style>
      <section class="terminal">
        <h1>Dark terminal world</h1>
        <p>Move near the right or bottom edge to reveal floating scrollbars.</p>
      </section>
    </fan-card>

    <fan-card aria-label="Paper article">
      <style>
        :host {
          display:block;
          min-height:100%;
          background:#fbf2df;
          color:#261f18;
          font-family:Georgia, serif;
        }

        article { min-width:100%; min-height:800px; padding:38px; }
        p { line-height:1.9; }
      </style>
      <article>
        <h1>Paper article world</h1>
        <p>Each card owns its complete visual language.</p>
      </article>
    </fan-card>
  </fan-poker>

  <script type="module">
    await customElements.whenDefined("fan-poker");
    const deck = document.querySelector("#deck");

    setTimeout(() => {
      deck.appendCard({
        label: "Runtime card",
        html: `
          <style>:host{display:block;min-height:100%;background:#d9f5ea;padding:30px}</style>
          <h1>Added at runtime</h1>
        `
      });
    }, 1200);
  </script>
</body>
</html>
