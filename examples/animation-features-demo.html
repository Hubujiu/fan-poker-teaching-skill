<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Animation Features · Fan Poker Teaching Skill</title>
<style>html,body{margin:0;min-height:100%;background:transparent}.status{max-width:680px;margin:80px auto;padding:24px;font:16px/1.7 system-ui;color:#333}</style>
</head>
<body>
<div class="status" id="status">正在装载动画能力示例…</div>
<script>
const cards=[
  {tag:"Render",title:"全程渲染",description:"每张牌始终保留完整 DOM、封面和正文，切换途中不会变成空白占位牌。",symbol:"A",accent:"#f2a65a"},
  {tag:"Queue",title:"连续点击不丢请求",description:"快速点击会进入队列，当前动画也会自动提速，牌堆能跟上操作节奏。",symbol:"K",accent:"#7dcfb6"},
  {tag:"Motion",title:"前牌沿纵深回到牌尾",description:"离场牌先抽出，再降低纵深，从后方顺滑放回最后一层，而不是平面飞走后突然出现。",symbol:"Q",accent:"#8e9aef"},
  {tag:"Input",title:"四种切换方式",description:"点击、左右拖动、鼠标滚轮和键盘都能控制牌堆，不需要额外按钮。",symbol:"J",accent:"#f4978e"},
  {tag:"API",title:"可由外部页面控制",symbol:"10",accent:"#90be6d",html:"<p class='card-tag'>API</p><h2 class='card-title'>可由外部页面控制</h2><div class='card-description'><pre><code>fanPokerDeck.requestStep(1)\nfanPokerDeck.requestStep(-1)\nfanPokerDeck.goTo(3)</code></pre><p>可接入课程目录、博客按钮或产品引导。</p></div>"},
  {tag:"Layout",title:"透明且响应式",description:"页面本身不绘制底色，牌堆会按动画包围盒整体缩放，避免移动端拉伸或裁边。",symbol:"9",accent:"#f4d35e"}
];
(async()=>{
  try{
    const response=await fetch("../assets/fan-poker-base.html");
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    let source=await response.text();
    source=source.replace(/<title>[\s\S]*?<\/title>/,"<title>Animation Features · Fan Poker Teaching Skill</title>");
    source=source.replace(/const cardData=\[[\s\S]*?\];/,`const cardData=${JSON.stringify(cards)};`);
    document.open();document.write(source);document.close();
  }catch(error){
    document.querySelector("#status").innerHTML=`<h1>无法装载示例</h1><p>${error.message}</p><p>请通过 GitHub Pages 或本地 HTTP 服务器打开此文件。</p>`;
  }
})();
</script>
</body>
</html>
