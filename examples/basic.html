<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fan Poker Web Component · Basic</title>
  <script type="module" src="../dist/fan-poker.js"></script>
  <style>html,body{margin:0;min-height:100%;background:transparent}body{padding:24px 8px}</style>
</head>
<body>
  <fan-poker card-width="390px" card-height="520px" aria-label="Git 基础教学牌组">
    <fan-card tag="Git" title="工作区" symbol="01" accent="#f2a65a">
      工作区保存你正在编辑、但尚未提交的文件变化。
    </fan-card>
    <fan-card tag="Git" title="暂存区" symbol="02" accent="#7dcfb6">
      <p><code>git add</code> 把选中的修改放进暂存区。</p>
      <pre><code>git add README.md</code></pre>
    </fan-card>
    <fan-card tag="Git" title="提交" symbol="03" accent="#8e9aef">
      <p><code>git commit</code> 将暂存区内容保存为一次版本快照。</p>
    </fan-card>
  </fan-poker>
</body>
</html>
