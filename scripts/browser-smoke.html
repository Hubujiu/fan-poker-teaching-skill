<!doctype html>
<html>
<body>
<script type="module" src="../dist/fan-poker.js"></script>

<fan-poker id="deck" card-width="320px" card-height="430px" aria-label="Smoke world deck">
  <fan-card aria-label="First world">
    <style>
      :host { display:block; min-width:100%; min-height:100%; background:#101713; color:white; }
      .world { min-width:760px; min-height:900px; padding:20px; background:#101713; }
      button { padding:8px; }
    </style>
    <section class="world">
      <h1>Custom world</h1>
      <button type="button">Interactive</button>
      <p>Full-card custom content</p>
    </section>
  </fan-card>

  <fan-card aria-label="Second world">
    <style>:host{display:block;min-height:100%;background:#fff4df}</style>
    <article><h1>Second</h1><p>Independent style world.</p></article>
  </fan-card>

  <fan-card aria-label="Third world">
    <div>Third</div>
  </fan-card>
</fan-poker>

<pre id="result">pending</pre>

<script type="module">
  const result = document.querySelector("#result");

  const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

  try {
    const component = await import("../dist/fan-poker.js?browser-smoke=v2");
    await customElements.whenDefined("fan-poker");

    const deck = document.querySelector("#deck");
    const events = [];

    deck.addEventListener("cardchange", (event) => {
      events.push(["cardchange", event.detail.index, event.detail.source]);
    });
    deck.addEventListener("cardschange", (event) => {
      events.push(["cardschange", event.detail.cardCount]);
    });

    await wait(120);

    const checks = [];
    const cards = [...deck.shadowRoot.querySelectorAll('[part="card"]')];
    const status = deck.shadowRoot.querySelector('[part="status"]');
    const firstCard = cards[0];
    const firstWorldHost = firstCard.querySelector('[part="world"]');
    const firstWorldRoot = firstWorldHost.shadowRoot;
    const firstScroll = firstWorldRoot.querySelector(".world-scroll");
    const firstShell = firstWorldRoot.querySelector(".world-shell");
    const horizontalBar = firstWorldRoot.querySelector('[part="horizontal-scrollbar"]');
    const verticalBar = firstWorldRoot.querySelector('[part="vertical-scrollbar"]');
    const worldStyleText = firstWorldRoot.querySelector("style").textContent;
    const deckStyleText = deck.shadowRoot.querySelector("style").textContent;

    checks.push(["defined", Boolean(customElements.get("fan-poker"))]);
    checks.push([
      "exports",
      typeof component.FanPokerElement === "function" &&
        typeof component.FanCardElement === "function" &&
        typeof component.defineFanPokerElements === "function"
    ]);
    checks.push(["idempotentRegistration", component.defineFanPokerElements() === true]);
    checks.push(["shadow", Boolean(deck.shadowRoot)]);
    checks.push(["initialCount", deck.cardCount === 3]);
    checks.push(["hostRole", deck.getAttribute("role") === "region"]);
    checks.push([
      "roleDescription",
      deck.getAttribute("aria-roledescription") === "interactive card deck"
    ]);
    checks.push([
      "keyShortcuts",
      deck.getAttribute("aria-keyshortcuts")?.includes("ArrowRight")
    ]);

    checks.push(["renderedCards", cards.length === 3]);
    checks.push([
      "activeCardSemantics",
      firstCard.getAttribute("role") === "group" &&
        firstCard.getAttribute("aria-roledescription") === "card"
    ]);
    checks.push([
      "singleAccessibleCard",
      cards.filter((card) => card.getAttribute("aria-hidden") === "false").length === 1
    ]);
    checks.push([
      "initialStatus",
      status.textContent.includes("First world") &&
        status.textContent.includes("1 of 3")
    ]);

    checks.push(["isolatedWorldShadow", Boolean(firstWorldRoot)]);
    checks.push([
      "customWorldPreserved",
      Boolean(firstWorldRoot.querySelector("h1")) &&
        firstWorldRoot.querySelector("h1").textContent === "Custom world"
    ]);
    checks.push([
      "fixedTemplateRemoved",
      !firstCard.querySelector('[part="cover"]') &&
        !firstCard.querySelector('[part="title"]') &&
        !firstCard.querySelector('[part="body"]')
    ]);
    checks.push([
      "noFocusIndicator",
      !deckStyleText.includes(":focus-visible) .card") &&
        deckStyleText.includes(":host(:focus-visible)") &&
        deckStyleText.includes("outline: none")
    ]);

    checks.push([
      "nativeScrollbarsHidden",
      worldStyleText.includes("scrollbar-width: none") &&
        worldStyleText.includes(".world-scroll::-webkit-scrollbar")
    ]);
    checks.push([
      "floatingScrollbarsPresent",
      Boolean(horizontalBar) && Boolean(verticalBar)
    ]);

    await wait(80);
    checks.push([
      "overflowDetected",
      horizontalBar.classList.contains("has-overflow") &&
        verticalBar.classList.contains("has-overflow")
    ]);

    firstScroll.setPointerCapture = () => {};
    firstScroll.hasPointerCapture = () => false;
    firstScroll.releasePointerCapture = () => {};

    firstScroll.dispatchEvent(
      new PointerEvent("pointerdown", {
        pointerId: 71,
        pointerType: "mouse",
        isPrimary: true,
        button: 0,
        buttons: 1,
        clientX: 100,
        clientY: 100,
        bubbles: true,
        composed: true,
        cancelable: true
      })
    );

    firstScroll.dispatchEvent(
      new PointerEvent("pointermove", {
        pointerId: 71,
        pointerType: "mouse",
        isPrimary: true,
        button: 0,
        buttons: 1,
        clientX: 155,
        clientY: 100,
        bubbles: true,
        composed: true,
        cancelable: true
      })
    );

    checks.push([
      "horizontalPanDirection",
      firstScroll.scrollLeft > 0
    ]);
    checks.push([
      "panShowsActiveScrollbar",
      firstShell.classList.contains("panning-x")
    ]);
    checks.push([
      "panDoesNotStartDeckDrag",
      deck._drag === null
    ]);

    firstScroll.dispatchEvent(
      new PointerEvent("pointerup", {
        pointerId: 71,
        pointerType: "mouse",
        isPrimary: true,
        button: 0,
        buttons: 0,
        clientX: 155,
        clientY: 100,
        bubbles: true,
        composed: true,
        cancelable: true
      })
    );

    checks.push([
      "panEndsCleanly",
      !firstShell.classList.contains("panning-x")
    ]);

    const previousScrollTop = firstScroll.scrollTop;
    firstScroll.scrollTop = previousScrollTop + 80;
    firstScroll.dispatchEvent(new Event("scroll"));
    checks.push([
      "verticalScrollRemainsInsideWorld",
      deck.currentIndex === 0 && firstScroll.scrollTop > previousScrollTop
    ]);

    deck.next();
    await wait(80);
    checks.push(["next", deck.currentIndex === 1]);
    checks.push([
      "nextStatus",
      status.textContent.includes("Second world") &&
        status.textContent.includes("2 of 3")
    ]);

    deck.setCards([
      {
        label: "Alpha world",
        html: "<style>:host{display:block;background:#fee;min-height:100%}</style><main>Alpha</main>"
      },
      {
        label: "Beta world",
        content: "Plain text"
      }
    ]);

    await wait(40);
    checks.push(["setCards", deck.cardCount === 2 && deck.currentIndex === 0]);
    checks.push([
      "setCardsHtml",
      deck.shadowRoot
        .querySelector('[part="card"] [part="world"]')
        .shadowRoot.querySelector("main")?.textContent === "Alpha"
    ]);

    const appended = deck.appendCard({
      label: "Gamma world",
      html: "<section>Gamma</section>"
    });
    checks.push(["appendCard", appended === 2 && deck.cardCount === 3]);

    checks.push([
      "updateCard",
      deck.updateCard(1, { label: "Beta 2", html: "<strong>Two</strong>" }) &&
        deck.cards[1].label === "Beta 2"
    ]);

    const removed = deck.removeCard(0);
    checks.push([
      "removeCard",
      removed?.label === "Alpha world" && deck.cardCount === 2
    ]);
    checks.push([
      "cardschangeEvent",
      events.some(([name]) => name === "cardschange")
    ]);
    checks.push([
      "cardchangeEvent",
      events.some(([name, index]) => name === "cardchange" && index === 1)
    ]);

    const ok = checks.every(([, value]) => value);
    result.textContent = JSON.stringify({ ok, checks, events });
    document.documentElement.dataset.smoke = ok ? "passed" : "failed";
  } catch (error) {
    result.textContent = JSON.stringify({
      ok: false,
      error: error?.stack || String(error)
    });
    document.documentElement.dataset.smoke = "failed";
  }
</script>
</body>
</html>
