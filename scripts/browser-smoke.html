<!doctype html>
<html><body>
<script>
  let smokeClock = performance.now();
  const smokeTimers = new Map();
  let smokeTimerId = 0;

  window.requestAnimationFrame = (callback) => {
    const id = ++smokeTimerId;
    const timer = setTimeout(() => {
      smokeTimers.delete(id);
      smokeClock += 1000;
      callback(smokeClock);
    }, 0);
    smokeTimers.set(id, timer);
    return id;
  };

  window.cancelAnimationFrame = (id) => {
    const timer = smokeTimers.get(id);
    if (timer !== undefined) clearTimeout(timer);
    smokeTimers.delete(id);
  };
</script>
<script type="module" src="../dist/fan-poker.js"></script>
<fan-poker id="deck" card-width="320px" card-height="430px" theme="dark" aria-label="Smoke lesson">
  <fan-card tag="One" title="First" symbol="01">A</fan-card>
  <fan-card tag="Two" title="Second" symbol="02">B</fan-card>
  <fan-card tag="Three" title="Third" symbol="03">C</fan-card>
</fan-poker>
<pre id="result">pending</pre>
<script type="module">
  const result = document.querySelector("#result");

  try {
    const component = await import("../dist/fan-poker.js?browser-smoke=v1");
    await customElements.whenDefined("fan-poker");
    const deck = document.querySelector("#deck");
    const events = [];
    deck.addEventListener("cardchange", (event) => events.push(["cardchange", event.detail.index]));
    deck.addEventListener("cardschange", (event) => events.push(["cardschange", event.detail.cardCount]));
    await new Promise((resolve) => setTimeout(resolve, 150));

    const checks = [];
    checks.push(["defined", Boolean(customElements.get("fan-poker"))]);
    checks.push(["exports", typeof component.FanPokerElement === "function" && typeof component.FanCardElement === "function" && typeof component.defineFanPokerElements === "function"]);
    checks.push(["idempotentRegistration", component.defineFanPokerElements() === true]);
    checks.push(["shadow", Boolean(deck.shadowRoot)]);
    checks.push(["initialCount", deck.cardCount === 3]);
    checks.push(["theme", deck.getAttribute("theme") === "dark"]);
    checks.push(["hostRole", deck.getAttribute("role") === "region"]);
    checks.push(["roleDescription", deck.getAttribute("aria-roledescription") === "interactive card deck"]);
    checks.push(["keyShortcuts", deck.getAttribute("aria-keyshortcuts")?.includes("ArrowRight")]);

    const initialCards = [...deck.shadowRoot.querySelectorAll('[part="card"]')];
    const status = deck.shadowRoot.querySelector('[part="status"]');
    checks.push(["parts", initialCards.length === 3 && Boolean(status)]);
    checks.push(["activeCardSemantics", initialCards[0].getAttribute("role") === "group" && initialCards[0].getAttribute("aria-roledescription") === "card"]);
    checks.push(["singleAccessibleCard", initialCards.filter((card) => card.getAttribute("aria-hidden") === "false").length === 1]);
    checks.push(["initialStatus", status.textContent.includes("First") && status.textContent.includes("1 of 3")]);

    deck.next();
    await new Promise((resolve) => setTimeout(resolve, 150));
    checks.push(["next", deck.currentIndex === 1]);
    checks.push(["nextStatus", status.textContent.includes("Second") && status.textContent.includes("2 of 3")]);

    deck.setCards([
      { tag: "A", title: "Alpha", content: "One", symbol: "A" },
      { tag: "B", title: "Beta", html: "<strong>Two</strong>", symbol: "B" }
    ]);
    checks.push(["setCards", deck.cardCount === 2 && deck.currentIndex === 0]);

    const appended = deck.appendCard({ tag: "C", title: "Gamma", content: "Three" });
    checks.push(["appendCard", appended === 2 && deck.cardCount === 3]);
    checks.push(["updateCard", deck.updateCard(1, { title: "Beta 2" }) && deck.cards[1].title === "Beta 2"]);
    const removed = deck.removeCard(0);
    checks.push(["removeCard", removed?.title === "Alpha" && deck.cardCount === 2]);
    checks.push(["cardschangeEvent", events.some(([name]) => name === "cardschange")]);
    checks.push(["cardchangeEvent", events.some(([name, index]) => name === "cardchange" && index === 1)]);

    const ok = checks.every(([, value]) => value);
    result.textContent = JSON.stringify({ ok, checks, events });
    document.documentElement.dataset.smoke = ok ? "passed" : "failed";
  } catch (error) {
    result.textContent = JSON.stringify({ ok: false, error: error?.stack || String(error) });
    document.documentElement.dataset.smoke = "failed";
  }
</script>
</body></html>
