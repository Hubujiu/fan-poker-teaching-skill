name: Prepare v1.0.2 release

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/agent-release-1.0.2.yml"
      - "scripts/agent-release-1.0.2.py"

permissions:
  contents: write

jobs:
  prepare-test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Prepare release files
        run: python3 scripts/agent-release-1.0.2.py

      - name: Run package tests
        run: npm test

      - name: Run Chromium interaction smoke test
        run: npm run test:browser

      - name: Verify package payload
        run: npm pack --dry-run

      - name: Commit tested release
        shell: bash
        run: |
          rm .github/workflows/agent-release-1.0.2.yml
          rm scripts/agent-release-1.0.2.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json scripts/validate.mjs index.html CHANGELOG.md RELEASE_NOTES.md .github/npm-publish-trigger .github/workflows/agent-release-1.0.2.yml scripts/agent-release-1.0.2.py
          git commit -m "Prepare v1.0.2"
          git push origin HEAD:${{ github.head_ref }}
