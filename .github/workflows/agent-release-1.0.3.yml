name: Prepare v1.0.3 focus fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/agent-release-1.0.3.yml"
      - "scripts/agent-release-1.0.3.py"

permissions:
  contents: write

jobs:
  patch-test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Apply focus indicator and release patch
        run: python3 scripts/agent-release-1.0.3.py

      - name: Run package tests
        run: npm test

      - name: Run Chromium smoke test
        run: npm run test:browser

      - name: Verify package payload
        run: npm pack --dry-run

      - name: Commit tested patch
        shell: bash
        run: |
          rm .github/workflows/agent-release-1.0.3.yml
          rm scripts/agent-release-1.0.3.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/fan-poker.js dist/fan-poker.js scripts/browser-smoke.html package.json scripts/validate.mjs README.md README_EN.md SKILL.md docs/FRAMEWORKS.md docs/VERSIONING.md index.html CHANGELOG.md RELEASE_NOTES.md .github/npm-publish-trigger .github/workflows/agent-release-1.0.3.yml scripts/agent-release-1.0.3.py
          git commit -m "Release v1.0.3 focus indicator fix"
          git push origin HEAD:${{ github.head_ref }}
