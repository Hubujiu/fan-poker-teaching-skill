name: Publish npm package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - ".github/npm-publish-trigger"
      - ".github/apply-v0.2-branch-trigger"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'Run v0.2 branch build') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use a Trusted Publishing compatible npm CLI
        run: npm install --global npm@latest

      - name: Validate and build package
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `name=${pkg.name}\nversion=${pkg.version}\n`);
          NODE

      - name: Check whether this version already exists
        id: existing
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish public package with provenance
        id: publish
        if: steps.existing.outputs.published != 'true'
        continue-on-error: true
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify registry state
        id: verify
        if: always()
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify jsDelivr and unpkg
        id: cdn
        if: always() && steps.verify.outputs.published == 'true'
        continue-on-error: true
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          (async () => {
            const name = '${{ steps.package.outputs.name }}';
            const version = '${{ steps.package.outputs.version }}';
            const urls = {
              jsdelivr: `https://cdn.jsdelivr.net/npm/${name}@${version}/dist/fan-poker.js`,
              unpkg: `https://unpkg.com/${name}@${version}/dist/fan-poker.js`
            };

            for (const [key, url] of Object.entries(urls)) {
              let ok = false;
              for (let attempt = 0; attempt < 6 && !ok; attempt += 1) {
                const response = await fetch(url, { redirect: 'follow' });
                const body = await response.text();
                ok = response.ok && body.includes('customElements.define("fan-poker"') && body.includes('customElements.define("fan-card"');
                if (!ok) await new Promise(resolve => setTimeout(resolve, 10000));
              }
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${ok}\n`);
            }
          })().catch(error => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE

      - name: Write publish result
        if: always()
        shell: bash
        run: |
          mkdir -p .github
          cat > .github/npm-publish-result.json <<EOF
          {
            "package": "${{ steps.package.outputs.name }}",
            "version": "${{ steps.package.outputs.version }}",
            "alreadyPublishedBeforeRun": "${{ steps.existing.outputs.published }}",
            "publishStepOutcome": "${{ steps.publish.outcome }}",
            "availableOnRegistry": "${{ steps.verify.outputs.published }}",
            "jsDelivr": "${{ steps.cdn.outputs.jsdelivr }}",
            "unpkg": "${{ steps.cdn.outputs.unpkg }}",
            "runId": "${{ github.run_id }}",
            "commit": "${{ github.sha }}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/npm-publish-result.json
          if ! git diff --cached --quiet; then
            git commit -m "Record npm publish result"
            git push
          fi

      - name: Fail when release endpoints are unavailable
        if: always() && (steps.verify.outputs.published != 'true' || steps.cdn.outputs.jsdelivr != 'true' || steps.cdn.outputs.unpkg != 'true')
        run: exit 1

  build-v02:
    if: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, 'Run v0.2 branch build') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Assemble and validate v0.2 branch
        run: |
          git fetch origin agent/web-component-v0.2.0
          git checkout -B agent/web-component-v0.2.0 origin/agent/web-component-v0.2.0
          cat .github/v0.2-source-chunks/* > src/fan-poker.js
          chmod +x scripts/browser-smoke.sh
          npm run build
          npm test
          npm pack --dry-run
          bash scripts/browser-smoke.sh
          rm -rf .github/v0.2-source-chunks
          rm -f .github/v0.2-source-ready
          rm -f .github/workflows/apply-v0.2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Web Component v0.2.0"
          git push origin HEAD:agent/web-component-v0.2.0
