name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-validation:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Validate package on Node ${{ matrix.node }}
        run: npm test
      - name: Verify npm package contents
        if: ${{ matrix.node == 24 }}
        run: npm pack --dry-run

  browser-smoke:
    needs: static-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Run Chromium browser smoke test
        run: bash scripts/browser-smoke.sh
