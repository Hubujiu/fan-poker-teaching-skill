name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "media/**"
      - "docs/**"
      - "examples/**"
      - "dist/**"
      - "assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          for directory in media docs examples dist assets; do
            if [ -d "$directory" ]; then
              cp -R "$directory" "_site/$directory"
            fi
          done
          touch _site/.nojekyll
          test -s _site/index.html
          test -s _site/media/preview.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
