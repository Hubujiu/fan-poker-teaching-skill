name: Fix card style isolation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-card-style-isolation.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Patch source and demo
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          old = '''function copySafeWorld(source, target) {
            const template = document.createElement("template");
            template.innerHTML = source.innerHTML;
            template.content.querySelectorAll("script").forEach((script) => script.remove());
            target.append(template.content.cloneNode(true));
          }

          export class FanCardElement extends HTMLElementBase {
            connectedCallback() {
              this.hidden = true;
            }
          }
          '''

          new = '''function disableSourceStyles(source) {
            source.querySelectorAll("style").forEach((style) => {
              style.disabled = true;
            });
          }

          function copySafeWorld(source, target) {
            disableSourceStyles(source);

            const template = document.createElement("template");
            template.innerHTML = source.innerHTML;
            template.content.querySelectorAll("script").forEach((script) => script.remove());
            template.content.querySelectorAll("style").forEach((style) => {
              style.disabled = false;
            });
            target.append(template.content.cloneNode(true));
          }

          export class FanCardElement extends HTMLElementBase {
            connectedCallback() {
              disableSourceStyles(this);
              this.hidden = true;
            }
          }
          '''

          for filename in ("src/fan-poker.js", "dist/fan-poker.js"):
            path = Path(filename)
            text = path.read_text(encoding="utf-8")
            if old not in text:
              raise SystemExit(f"Expected component block not found in {filename}")
            path.write_text(text.replace(old, new, 1), encoding="utf-8")

          index = Path("index.html")
          text = index.read_text(encoding="utf-8")
          text = text.replace(
            'src="https://cdn.jsdelivr.net/npm/@hubujiu/fan-poker-deck@2.0.0/dist/fan-poker.js"',
            'src="./dist/fan-poker.js?v=2.0.1-style-isolation"',
            1,
          )
          index.write_text(text, encoding="utf-8")
          PY

      - name: Install and test
        run: |
          npm ci
          npm test

      - name: Commit fix and remove temporary workflow
        run: |
          git rm .github/workflows/fix-card-style-isolation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/fan-poker.js dist/fan-poker.js index.html
          git commit -m "Fix fan-card source style leakage"
          git push
