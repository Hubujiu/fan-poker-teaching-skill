name: Apply interaction fixes on PR

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/agent-fix-interactions-pr.yml"
      - "scripts/agent-fix-interactions.py"
      - "scripts/agent-fix-interactions-test-adjust.py"

permissions:
  contents: write

jobs:
  patch-test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Apply fixes
        run: |
          python3 scripts/agent-fix-interactions.py
          python3 scripts/agent-fix-interactions-test-adjust.py

      - name: Run package tests
        run: npm test

      - name: Run Chromium interaction smoke test
        id: browser-smoke
        continue-on-error: true
        run: npm run test:browser

      - name: Upload browser smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interaction-smoke-result
          path: .github/browser-smoke-result.txt
          if-no-files-found: warn

      - name: Fail when browser smoke failed
        if: steps.browser-smoke.outcome != 'success'
        run: exit 1

      - name: Commit tested fixes
        shell: bash
        run: |
          rm .github/workflows/agent-fix-interactions.yml
          rm .github/workflows/agent-fix-interactions-pr.yml
          rm scripts/agent-fix-interactions.py
          rm scripts/agent-fix-interactions-test-adjust.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/fan-poker.js dist/fan-poker.js scripts/browser-smoke.html .github/workflows/agent-fix-interactions.yml .github/workflows/agent-fix-interactions-pr.yml scripts/agent-fix-interactions.py scripts/agent-fix-interactions-test-adjust.py
          git commit -m "Fix pointer and wheel interactions"
          git push origin HEAD:${{ github.head_ref }}
