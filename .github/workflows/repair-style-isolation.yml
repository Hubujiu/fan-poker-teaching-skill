name: Repair source style isolation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/repair-style-isolation.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Patch component and regression coverage
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          source = Path("src/fan-poker.js")
          replace_once(
              source,
              '''function copySafeWorld(source, target) {
            const template = document.createElement("template");
            template.innerHTML = source.innerHTML;
            template.content.querySelectorAll("script").forEach((script) => script.remove());
            target.append(template.content.cloneNode(true));
          }

          export class FanCardElement extends HTMLElementBase {
            connectedCallback() {
              this.hidden = true;
            }
          }''',
              '''const sourceStyleMedia = new WeakMap();

          function quarantineSourceStyles(root) {
            root.querySelectorAll("style").forEach((style) => {
              const currentMedia = style.getAttribute("media");

              if (!sourceStyleMedia.has(style) || currentMedia !== "not all") {
                sourceStyleMedia.set(style, currentMedia);
              }

              if (currentMedia !== "not all") {
                style.setAttribute("media", "not all");
              }
            });
          }

          function restoreClonedStyles(source, cloneRoot) {
            const sourceStyles = [...source.querySelectorAll("style")];
            const clonedStyles = [...cloneRoot.querySelectorAll("style")];

            clonedStyles.forEach((style, index) => {
              const sourceStyle = sourceStyles[index];
              if (!sourceStyle || !sourceStyleMedia.has(sourceStyle)) return;

              const media = sourceStyleMedia.get(sourceStyle);
              if (media === null) {
                style.removeAttribute("media");
              } else {
                style.setAttribute("media", media);
              }
            });
          }

          function serializeWorld(source) {
            quarantineSourceStyles(source);
            const template = document.createElement("template");
            template.innerHTML = source.innerHTML;
            restoreClonedStyles(source, template.content);
            return template.innerHTML;
          }

          function copySafeWorld(source, target) {
            quarantineSourceStyles(source);
            const template = document.createElement("template");
            template.innerHTML = source.innerHTML;
            template.content.querySelectorAll("script").forEach((script) => script.remove());
            restoreClonedStyles(source, template.content);
            target.append(template.content.cloneNode(true));
          }

          export class FanCardElement extends HTMLElementBase {
            connectedCallback() {
              this.hidden = true;
              quarantineSourceStyles(this);

              if (!this._styleObserver && globalThis.MutationObserver) {
                this._styleObserver = new globalThis.MutationObserver(() => {
                  quarantineSourceStyles(this);
                });
              }

              this._styleObserver?.observe(this, {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: ["media"]
              });
            }

            disconnectedCallback() {
              this._styleObserver?.disconnect();
            }
          }'''
          )

          replace_once(
              source,
              '''      html: source.innerHTML
            }));''',
              '''      html: serializeWorld(source)
            }));'''
          )

          smoke = Path("scripts/browser-smoke.html")
          replace_once(
              smoke,
              '''<body>
          <script type="module" src="../dist/fan-poker.js"></script>''',
              '''<body>
          <div id="style-leak-probe" class="world">Outside style probe</div>
          <script type="module" src="../dist/fan-poker.js"></script>'''
          )
          replace_once(
              smoke,
              '''    const firstWorldRoot = firstWorldHost.shadowRoot;
              const firstScroll = firstWorldRoot.querySelector(".world-scroll");''',
              '''    const firstWorldRoot = firstWorldHost.shadowRoot;
              const sourceWorldStyle = deck.querySelector(":scope > fan-card style");
              const renderedWorldStyle = firstWorldRoot.querySelector(".world-canvas style");
              const outsideStyleProbe = document.querySelector("#style-leak-probe");
              const firstScroll = firstWorldRoot.querySelector(".world-scroll");'''
          )
          replace_once(
              smoke,
              '''    checks.push([
                "customWorldPreserved",
                Boolean(firstWorldRoot.querySelector("h1")) &&
                  firstWorldRoot.querySelector("h1").textContent === "Custom world"
              ]);
              checks.push([
                "fixedTemplateRemoved",''',
              '''    checks.push([
                "customWorldPreserved",
                Boolean(firstWorldRoot.querySelector("h1")) &&
                  firstWorldRoot.querySelector("h1").textContent === "Custom world"
              ]);
              checks.push([
                "sourceStylesQuarantined",
                sourceWorldStyle?.getAttribute("media") === "not all"
              ]);
              checks.push([
                "sourceStylesDoNotLeak",
                getComputedStyle(outsideStyleProbe).minHeight !== "900px"
              ]);
              checks.push([
                "worldStylesRestored",
                !renderedWorldStyle?.hasAttribute("media") &&
                  getComputedStyle(firstWorldRoot.querySelector(".world")).minHeight === "900px"
              ]);
              checks.push([
                "fixedTemplateRemoved",'''
          )

          index = Path("index.html")
          replace_once(
              index,
              'src="https://cdn.jsdelivr.net/npm/@hubujiu/fan-poker-deck@2.0.0/dist/fan-poker.js"',
              'src="./dist/fan-poker.js?v=style-isolation-fix"'
          )

          pages = Path(".github/workflows/pages.yml")
          replace_once(
              pages,
              '''
                    head_end = next(index for index, line in enumerate(lines) if "</head>" in line)
                    isolation_fallback = [
                        '  <style id="demo-style-isolation-fallback">',
                        '    body > main { min-width: 0 !important; min-height: 0 !important; padding: 0 !important; }',
                        '    body .section h2 { color: var(--text) !important; line-height: normal !important; }',
                        '    body .grid > article.feature { min-width: 0 !important; min-height: 0 !important; }',
                        '    body .code > pre { width: auto !important; padding: 0 !important; border: 0 !important; border-radius: 0 !important; background: transparent !important; }',
                        '  </style>',
                    ]
                    lines[head_end:head_end] = isolation_fallback
          ''',
              '''
          '''
          )
          replace_once(
              pages,
              '''          grep -Fq '/fan-poker-teaching-skill/favicon.png?v=3' _site/index.html
                    grep -Fq 'demo-style-isolation-fallback' _site/index.html''',
              '''          grep -Fq '/fan-poker-teaching-skill/favicon.png?v=3' _site/index.html'''
          )
          replace_once(
              pages,
              '''      - name: Verify published favicon and demo styles''',
              '''      - name: Verify published favicon and component'''
          )
          replace_once(
              pages,
              '''            if curl -fsSL -H 'Cache-Control: no-cache' "$site/?verify=${{ github.sha }}-$attempt" -o /tmp/page.html; then
                        if grep -Fq '/fan-poker-teaching-skill/favicon.png?v=3' /tmp/page.html \
                          && grep -Fq 'demo-style-isolation-fallback' /tmp/page.html; then
                          page_ok=true
                        fi
                      fi''',
              '''            if curl -fsSL -H 'Cache-Control: no-cache' "$site/?verify=${{ github.sha }}-$attempt" -o /tmp/page.html; then
                        grep -Fq '/fan-poker-teaching-skill/favicon.png?v=3' /tmp/page.html && page_ok=true
                      fi'''
          )
          PY

      - name: Run package validation
        run: npm test

      - name: Run browser regression test
        run: bash scripts/browser-smoke.sh

      - name: Commit repaired component
        shell: bash
        run: |
          rm .github/workflows/repair-style-isolation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/fan-poker.js dist/fan-poker.js scripts/browser-smoke.html index.html .github/workflows/pages.yml .github/workflows/repair-style-isolation.yml
          git commit -m "Fix source card style isolation"
          git push

# Trigger after workflow registration
