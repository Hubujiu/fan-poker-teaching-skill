name: Apply v0.2 source

on:
  push:
    branches: [agent/web-component-v0.2.0]
    paths:
      - ".github/v0.2-source-ready"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Assemble readable Web Component source
        run: |
          cat .github/v0.2-source-chunks/* > src/fan-poker.js
          chmod +x scripts/browser-smoke.sh
          npm run build
      - name: Validate generated repository
        run: npm test
      - name: Run Chromium browser smoke test
        run: bash scripts/browser-smoke.sh
      - name: Commit generated v0.2 files
        run: |
          rm -rf .github/v0.2-source-chunks
          rm .github/v0.2-source-ready
          rm .github/workflows/apply-v0.2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Web Component v0.2.0"
          git push
